name: Python Tests

on:
  push:
    branches: [main]
    paths: ['lambdas/**', 'tests/**', 'requirements-dev.txt']
  pull_request:
    paths: ['lambdas/**', 'tests/**', 'requirements-dev.txt']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --cov=lambdas/scheduler
